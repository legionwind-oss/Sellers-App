<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품대여 관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .mgmt-item-info {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      gap: 4px;
    }
    .mgmt-item-info .info-brand {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .mgmt-item-info .info-title {
      font-size: 13px;
      font-weight: 600;
      color: white;
      line-height: 1.3;
    }
    .mgmt-date-label {
      font-size: 11px;
      color: var(--accent-blue);
      font-weight: 500;
    }
    .mgmt-date {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }
    .mgmt-actions {
      display: flex;
      gap: 8px;
    }
    .mgmt-actions .btn-outline,
    .mgmt-actions .btn-action-primary {
      flex: 1;
      height: 40px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-action-primary {
      background: white;
      color: black;
      border: none;
    }
    .btn-action-primary:active {
      background: #e5e5e5;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="appHeader"></div>
    <main class="app-main">

      <div class="tab-bar" id="rentalTabs">
        <button class="tab-count-item active" data-status="신청">
          <span class="tab-count" id="countApply">1</span>
          <span class="tab-label">신청</span>
        </button>
        <button class="tab-count-item" data-status="확정">
          <span class="tab-count" id="countConfirm">1</span>
          <span class="tab-label">확정</span>
        </button>
        <button class="tab-count-item" data-status="배송">
          <span class="tab-count" id="countShip">1</span>
          <span class="tab-label">배송</span>
        </button>
        <button class="tab-count-item" data-status="이용중">
          <span class="tab-count" id="countUsing">1</span>
          <span class="tab-label">이용중</span>
        </button>
        <button class="tab-count-item" data-status="반납">
          <span class="tab-count" id="countReturn">1</span>
          <span class="tab-label">반납</span>
        </button>
      </div>

      <div id="rentalList"></div>
      <div class="empty-state" id="emptyState">해당 상태의 대여 내역이 없습니다.</div>

    </main>
    <div id="appBottomNav"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script>
  $(function () {
    var rentals = [
      {
        id: 1, status: '신청',
        brand: '마뗑킴(Matin Kim)',
        title: '글로시 레더 숄더백(블랙)',
        dateLabel: '대여 승인 대기중'
      },
      {
        id: 2, status: '확정',
        brand: '아크네 스튜디오',
        title: '머플러(그레이)',
        dateLabel: '결제 대기중'
      },
      {
        id: 3, status: '배송',
        brand: '마뗑킴(Matin Kim)',
        title: '글로시 레더 숄더백(블랙)',
        dateLabel: '배송 준비중'
      },
      {
        id: 4, status: '이용중',
        brand: '마뗑킴(Matin Kim)',
        title: '글로시 레더 숄더백(블랙)',
        dateLabel: '반납 예정일(2026/05/10)'
      },
      {
        id: 5, status: '반납',
        brand: '마뗑킴(Matin Kim)',
        title: '글로시 레더 숄더백(블랙)',
        dateLabel: '반납 완료'
      }
    ];

    var currentStatus = '신청';

    function updateCounts() {
      var counts = { '신청': 0, '확정': 0, '배송': 0, '이용중': 0, '반납': 0 };
      rentals.forEach(function (r) { counts[r.status]++; });
      $('#countApply').text(counts['신청']);
      $('#countConfirm').text(counts['확정']);
      $('#countShip').text(counts['배송']);
      $('#countUsing').text(counts['이용중']);
      $('#countReturn').text(counts['반납']);
    }

    function buildActions(r) {
      var html = '<div class="mgmt-actions">';
      switch (r.status) {
        case '신청':
          html += '<button class="btn-outline btn-cancel" data-id="' + r.id + '">취소하기</button>';
          break;
        case '확정':
          html += '<button class="btn-outline btn-cancel" data-id="' + r.id + '">취소하기</button>';
          html += '<button class="btn-action-primary btn-pay" data-id="' + r.id + '">결제하기</button>';
          break;
        case '배송':
          html += '<button class="btn-outline btn-track" data-id="' + r.id + '">배송조회</button>';
          html += '<button class="btn-action-primary btn-receive" data-id="' + r.id + '">상품수령</button>';
          break;
        case '이용중':
          html += '<button class="btn-action-primary btn-return-req" data-id="' + r.id + '">반납신청</button>';
          break;
        case '반납':
          break;
      }
      html += '</div>';
      return html;
    }

    function renderList() {
      var filtered = rentals.filter(function (r) { return r.status === currentStatus; });
      if (filtered.length === 0) {
        $('#rentalList').html('');
        $('#emptyState').show();
        return;
      }
      $('#emptyState').hide();
      var html = '';
      filtered.forEach(function (r) {
        html += '<div class="mgmt-item" data-item-id="' + r.id + '">';
        html += '<div class="mgmt-item-header">';
        html += '<span class="mgmt-date-label">' + r.dateLabel + '</span>';
        html += '</div>';
        html += '<div class="mgmt-item-body">';
        html += '<div class="mgmt-item-thumb"><div class="thumb-placeholder"><span>IMG</span></div></div>';
        html += '<div class="mgmt-item-info">';
        html += '<div class="info-brand">' + r.brand + '</div>';
        html += '<div class="info-title">' + r.title + '</div>';
        html += '</div>';
        html += '</div>';
        html += buildActions(r);
        html += '</div>';
      });
      $('#rentalList').html(html);
    }

    $('#rentalTabs').on('click', '.tab-count-item', function () {
      $('#rentalTabs .tab-count-item').removeClass('active');
      $(this).addClass('active');
      currentStatus = $(this).data('status');
      renderList();
    });

    $('#rentalList').on('click', '.btn-cancel', function () {
      var id = $(this).data('id');
      rentals = rentals.filter(function (r) { return r.id !== id; });
      updateCounts();
      renderList();
    });

    $('#rentalList').on('click', '.btn-pay', function () {
      var id = $(this).data('id');
      rentals.forEach(function (r) { if (r.id === id) { r.status = '배송'; r.dateLabel = '배송 준비중'; } });
      updateCounts();
      renderList();
    });

    $('#rentalList').on('click', '.btn-receive', function () {
      var id = $(this).data('id');
      rentals.forEach(function (r) { if (r.id === id) { r.status = '이용중'; r.dateLabel = '이용 중'; } });
      updateCounts();
      renderList();
    });

    $('#rentalList').on('click', '.btn-return-req', function () {
      var id = $(this).data('id');
      rentals.forEach(function (r) { if (r.id === id) { r.status = '반납'; r.dateLabel = '반납 완료'; } });
      updateCounts();
      renderList();
    });

    updateCounts();
    renderList();
  });
  </script>
</body>
</html>
