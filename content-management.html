<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>콘텐츠 관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 20px 12px;
    }
    .content-header-title {
      font-size: 15px;
      font-weight: 700;
      color: white;
    }
    .btn-new-feed {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-blue);
      background: none;
      border: 1px solid var(--accent-blue);
      border-radius: 9999px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-new-feed:active {
      opacity: 0.7;
    }
    .feed-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 20px 20px;
    }
    .feed-card-body {
      display: flex;
      gap: 14px;
    }
    .feed-thumb {
      width: 80px;
      height: 112px;
      border-radius: 8px;
      background: var(--bg-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .feed-thumb span {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 700;
    }
    .feed-info {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      gap: 4px;
    }
    .feed-status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      width: fit-content;
    }
    .feed-status-badge.selling {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
    }
    .feed-status-badge.hidden {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
    }
    .feed-title {
      font-size: 13px;
      font-weight: 600;
      color: white;
      line-height: 1.3;
    }
    .feed-period {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .feed-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-blue);
    }
    .feed-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .feed-actions .btn-feed-action {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 6px 10px;
    }
    .feed-actions .btn-feed-action:active {
      background: var(--bg-muted);
    }
    .feed-card.is-hidden {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="appHeader"></div>
    <main class="app-main">

      <div class="content-header">
        <span class="content-header-title">등록한 피드 목록</span>
        <button class="btn-new-feed">
          <span class="material-symbols-sharp" style="font-size:14px">add</span>
          새 피드 등록
        </button>
      </div>

      <div class="feed-list" id="feedList"></div>

    </main>
    <div id="appBottomNav"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script>
  $(function () {
    var feeds = [
      {
        id: 1,
        status: '판매중',
        title: '여름 데일리룩 TOP 3 릴스',
        period: '상시 판매',
        price: '5,000원',
        hidden: false
      },
      {
        id: 2,
        status: '숨김처리됨',
        title: '마뗑킴 가방 3종 리뷰 쇼츠',
        period: '상시 판매',
        price: '3,000원',
        hidden: true
      }
    ];

    function renderFeeds() {
      var html = '';
      feeds.forEach(function (f) {
        var cardClass = f.hidden ? ' is-hidden' : '';
        var badgeClass = f.hidden ? 'hidden' : 'selling';
        var toggleText = f.hidden ? '숨김해제' : '숨김';

        html += '<div class="feed-card' + cardClass + '" data-feed-id="' + f.id + '">';
        html += '<div class="feed-card-body">';
        html += '<div class="feed-thumb"><span>IMG</span></div>';
        html += '<div class="feed-info">';
        html += '<span class="feed-status-badge ' + badgeClass + '">' + f.status + '</span>';
        html += '<div class="feed-title">' + f.title + '</div>';
        html += '<div class="feed-period">' + f.period + '</div>';
        html += '<div class="feed-price">' + f.price + '</div>';
        html += '</div>';
        html += '</div>';
        html += '<div class="feed-actions">';
        html += '<button class="btn-feed-action">판매기간 설정</button>';
        html += '<button class="btn-feed-action">금액 설정</button>';
        html += '<button class="btn-feed-action btn-toggle-hide" data-id="' + f.id + '">' + toggleText + '</button>';
        html += '<button class="btn-feed-action btn-delete-feed" data-id="' + f.id + '">삭제</button>';
        html += '</div>';
        html += '</div>';
      });
      $('#feedList').html(html);
    }

    $('#feedList').on('click', '.btn-toggle-hide', function () {
      var id = $(this).data('id');
      feeds.forEach(function (f) {
        if (f.id === id) {
          f.hidden = !f.hidden;
          f.status = f.hidden ? '숨김처리됨' : '판매중';
        }
      });
      renderFeeds();
    });

    $('#feedList').on('click', '.btn-delete-feed', function () {
      var id = $(this).data('id');
      if (confirm('이 피드를 삭제하시겠습니까?')) {
        feeds = feeds.filter(function (f) { return f.id !== id; });
        renderFeeds();
      }
    });

    renderFeeds();
  });
  </script>
</body>
</html>
