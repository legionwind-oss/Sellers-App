<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검색</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .search-area {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg-main);
      padding: 12px 16px;
      border-bottom: 1px solid #222;
    }
    .search-area .search-input-wrap {
      gap: 8px;
    }
    .search-area .search-input-wrap input {
      font-size: 13px;
    }
    .search-area .btn-clear {
      display: none;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .search-area .btn-clear.show {
      display: flex;
    }
    .search-area .btn-search-go {
      color: var(--text-secondary);
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    /* 검색 전 */
    .before-search {
      padding: 20px 16px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-header .section-label {
      font-size: 14px;
      font-weight: 700;
    }
    .section-header .btn-clear-all {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .recommend-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }
    .recommend-scroll::-webkit-scrollbar { display: none; }
    .recommend-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .recommend-item .rec-thumb {
      width: 100px;
      height: 100px;
      background: #222;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
    }
    .recommend-item .rec-name {
      font-size: 10px;
      color: var(--text-secondary);
      text-align: center;
    }
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .recent-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      cursor: pointer;
    }
    .recent-item .recent-text {
      font-size: 13px;
      color: white;
      font-weight: 400;
    }
    .recent-item .btn-remove-recent {
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    /* 검색 후 */
    .after-search {
      display: none;
    }
    .after-search.show {
      display: block;
    }
    .before-search.hide {
      display: none;
    }
    .result-list {
      padding: 0 16px;
    }
    .result-item {
      display: flex;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-default);
      cursor: pointer;
    }
    .result-item .result-thumb {
      width: 100px;
      min-width: 100px;
      height: 100px;
      background: #222;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
    }
    .result-item .result-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .result-item .result-type {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent-blue);
    }
    .result-item .result-title {
      font-size: 14px;
      font-weight: 500;
      color: white;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-item .result-location {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .result-item .result-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .result-item .result-time {
      font-size: 10px;
      color: var(--text-muted);
    }
    .result-item .result-price {
      font-size: 13px;
      font-weight: 700;
      color: white;
    }
    .result-item .result-stats {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .result-item .result-stat {
      font-size: 10px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 3px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="appHeader"></div>
    <main class="app-main">
      <div class="search-area">
        <div class="search-input-wrap">
          <input type="text" id="searchInput" placeholder="검색어를 입력해주세요.">
          <button class="btn-clear" id="btnClear"></button>
          <button class="btn-search-go" id="btnSearchGo"></button>
        </div>
      </div>

      <!-- 검색 전 -->
      <div class="before-search" id="beforeSearch">
        <div class="section-header">
          <span class="section-label">추천 브랜드 상품</span>
        </div>
        <div class="recommend-scroll">
          <div class="recommend-item"><div class="rec-thumb">IMG</div><span class="rec-name">Brand Name 1</span></div>
          <div class="recommend-item"><div class="rec-thumb">IMG</div><span class="rec-name">Brand Name 2</span></div>
          <div class="recommend-item"><div class="rec-thumb">IMG</div><span class="rec-name">Brand Name 3</span></div>
          <div class="recommend-item"><div class="rec-thumb">IMG</div><span class="rec-name">Brand Name 4</span></div>
          <div class="recommend-item"><div class="rec-thumb">IMG</div><span class="rec-name">Brand Name 5</span></div>
        </div>

        <div class="section-header">
          <span class="section-label">최근 검색어</span>
          <button class="btn-clear-all" id="btnClearAll">전체 삭제</button>
        </div>
        <div class="recent-list" id="recentList">
          <div class="recent-item" data-keyword="여름 청바지">
            <span class="recent-text">여름 청바지</span>
            <button class="btn-remove-recent"></button>
          </div>
          <div class="recent-item" data-keyword="카시오 린넨">
            <span class="recent-text">카시오 린넨</span>
            <button class="btn-remove-recent"></button>
          </div>
          <div class="recent-item" data-keyword="반팔티">
            <span class="recent-text">반팔티</span>
            <button class="btn-remove-recent"></button>
          </div>
          <div class="recent-item" data-keyword="무료배송">
            <span class="recent-text">무료배송</span>
            <button class="btn-remove-recent"></button>
          </div>
        </div>
      </div>

      <!-- 검색 후 -->
      <div class="after-search" id="afterSearch">
        <div class="tab-bar" id="resultTabs">
          <button class="tab-item active" data-filter="all">전체</button>
          <button class="tab-item" data-filter="campaign">캠페인</button>
          <button class="tab-item" data-filter="rental">상품대여</button>
          <button class="tab-item" data-filter="brand">브랜드상품</button>
        </div>
        <div class="result-list" id="resultList"></div>
      </div>
    </main>
    <div id="appBottomNav"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script>
    $(function () {
      $('#btnClear').html(SVG.xSm);
      $('#btnSearchGo').html(SVG.searchSm);
      $('.btn-remove-recent').each(function () { $(this).html(SVG.xSm); });

      var results = [
        { type: 'campaign', typeLabel: '캠페인', title: '여름 반팔 피팅 캠페인', location: '강남구 역삼동', time: '2일 전', price: '협찬', likes: 12, comments: 4 },
        { type: 'rental', typeLabel: '상품대여', title: '캐논 M50 카메라 대여', location: '서초구 방배동', time: '1일 전', price: '일 15,000원', likes: 8, comments: 2 },
        { type: 'brand', typeLabel: '브랜드상품', title: '라센느 크롭 반팔티', location: '택배배송', time: '5시간 전', price: '29,000원', likes: 45, comments: 10 },
        { type: 'campaign', typeLabel: '캠페인', title: '뷰티 브랜드 앰배서더 1기', location: '온라인', time: '7일 전', price: '30만/월', likes: 156, comments: 24 },
        { type: 'rental', typeLabel: '상품대여', title: '고프로 히어로 11', location: '동작구 사당동', time: '방금 전', price: '일 20,000원', likes: 2, comments: 0 }
      ];

      function renderResults(filter) {
        var html = '';
        results.forEach(function (item) {
          if (filter !== 'all' && item.type !== filter) return;
          var commentHtml = item.comments > 0
            ? '<span class="result-stat">' + SVG.messageSquare + ' ' + item.comments + '</span>'
            : '';
          html += '<div class="result-item" data-type="' + item.type + '">' +
            '<div class="result-thumb">IMG</div>' +
            '<div class="result-content">' +
              '<span class="result-type">' + item.typeLabel + '</span>' +
              '<span class="result-title">' + item.title + '</span>' +
              '<span class="result-location">' + SVG.mapPin + ' ' + item.location + '</span>' +
              '<div class="result-meta">' +
                '<span class="result-time">' + item.time + '</span>' +
                '<span class="result-price">' + item.price + '</span>' +
              '</div>' +
              '<div class="result-stats">' +
                '<span class="result-stat">' + SVG.heart + ' ' + item.likes + '</span>' +
                commentHtml +
              '</div>' +
            '</div>' +
          '</div>';
        });
        $('#resultList').html(html);
      }

      function doSearch() {
        var keyword = $.trim($('#searchInput').val());
        if (!keyword) return;
        $('#beforeSearch').addClass('hide');
        $('#afterSearch').addClass('show');
        $('#resultTabs .tab-item').removeClass('active').first().addClass('active');
        renderResults('all');
      }

      $('#searchInput').on('input', function () {
        var val = $.trim($(this).val());
        if (val.length > 0) {
          $('#btnClear').addClass('show');
        } else {
          $('#btnClear').removeClass('show');
        }
      });

      $('#searchInput').on('keydown', function (e) {
        if (e.key === 'Enter') doSearch();
      });

      $('#btnSearchGo').on('click', doSearch);

      $('#btnClear').on('click', function () {
        $('#searchInput').val('').focus();
        $(this).removeClass('show');
        $('#beforeSearch').removeClass('hide');
        $('#afterSearch').removeClass('show');
      });

      $('.recent-item .recent-text').on('click', function () {
        var keyword = $(this).text();
        $('#searchInput').val(keyword);
        $('#btnClear').addClass('show');
        doSearch();
      });

      $('.btn-remove-recent').on('click', function (e) {
        e.stopPropagation();
        $(this).closest('.recent-item').fadeOut(200, function () { $(this).remove(); });
      });

      $('#btnClearAll').on('click', function () {
        $('#recentList').empty();
      });

      $('#resultTabs').on('click', '.tab-item', function () {
        $('#resultTabs .tab-item').removeClass('active');
        $(this).addClass('active');
        renderResults($(this).data('filter'));
      });
    });
  </script>
</body>
</html>
