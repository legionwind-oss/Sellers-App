<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>알림</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .noti-tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 8px;
    }
    .noti-tabs::-webkit-scrollbar { display: none; }
    .noti-tab {
      padding: 12px 12px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary);
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .noti-tab.active {
      border-bottom-color: white;
      color: white;
    }
    .noti-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .notification-item .noti-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .notification-item .noti-title {
      font-size: 13px;
      font-weight: 700;
      color: white;
    }
    .notification-item .noti-time {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .notification-item .noti-body {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .noti-empty {
      display: none;
      padding: 60px 16px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .noti-empty.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="appHeader"></div>
    <main class="app-main">
      <div class="noti-tabs" id="notiTabs">
        <button class="noti-tab active" data-filter="all">전체</button>
        <button class="noti-tab" data-filter="order">주문/배송</button>
        <button class="noti-tab" data-filter="campaign">캠페인</button>
        <button class="noti-tab" data-filter="rental">상품대여</button>
        <button class="noti-tab" data-filter="contact">컨택</button>
        <button class="noti-tab" data-filter="feed">피드</button>
        <button class="noti-tab" data-filter="inquiry">문의</button>
      </div>

      <div class="noti-list" id="notiList">
        <div class="notification-item unread" data-type="campaign">
          <div class="noti-header">
            <span class="noti-title">캠페인 선정 안내</span>
            <span class="noti-time">1시간 전</span>
          </div>
          <p class="noti-body">[라센느] 여름 청바지 캠페인에 선정되셨습니다!</p>
        </div>

        <div class="notification-item" data-type="all">
          <div class="noti-header">
            <span class="noti-title">포인트 적립</span>
            <span class="noti-time">2시간 전</span>
          </div>
          <p class="noti-body">리뷰 완료 보상으로 30,000P가 적립되었습니다.</p>
        </div>

        <div class="notification-item" data-type="campaign">
          <div class="noti-header">
            <span class="noti-title">신규 캠페인 알림</span>
            <span class="noti-time">1일 전</span>
          </div>
          <p class="noti-body">팔로우 중인 앤더슨벨에서 새로운 캠페인을 등록했습니다.</p>
        </div>

        <div class="notification-item" data-type="rental">
          <div class="noti-header">
            <span class="noti-title">대여 상품 발송</span>
            <span class="noti-time">1일 전</span>
          </div>
          <p class="noti-body">[라센느] 대여하신 상품이 발송되었습니다.</p>
        </div>

        <div class="notification-item" data-type="contact">
          <div class="noti-header">
            <span class="noti-title">새로운 컨택</span>
            <span class="noti-time">2일 전</span>
          </div>
          <p class="noti-body">새로운 상품 컨택 요청이 있습니다.</p>
        </div>

        <div class="notification-item" data-type="feed">
          <div class="noti-header">
            <span class="noti-title">피드 댓글</span>
            <span class="noti-time">3일 전</span>
          </div>
          <p class="noti-body">회원님의 피드에 새로운 댓글이 달렸습니다.</p>
        </div>
      </div>

      <div class="noti-empty" id="notiEmpty">알림이 없습니다.</div>
    </main>
    <div id="appBottomNav"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script>
    $(function () {
      $('#notiTabs').on('click', '.noti-tab', function () {
        $('.noti-tab').removeClass('active');
        $(this).addClass('active');

        var filter = $(this).data('filter');
        var visibleCount = 0;

        $('#notiList .notification-item').each(function () {
          var type = $(this).data('type');
          if (filter === 'all' || type === filter || type === 'all') {
            $(this).show();
            visibleCount++;
          } else {
            $(this).hide();
          }
        });

        if (visibleCount === 0) {
          $('#notiEmpty').addClass('show');
        } else {
          $('#notiEmpty').removeClass('show');
        }
      });
    });
  </script>
</body>
</html>
