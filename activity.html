<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 활동</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .activity-stats {
      display: flex;
      align-items: center;
      padding: 20px 16px;
    }
    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .stat-item .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: white;
      line-height: 1;
    }
    .stat-item .stat-label {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1;
    }
    .stat-divider {
      width: 1px;
      height: 32px;
      background: var(--border-subtle);
      flex-shrink: 0;
    }
    .activity-menu-list {
      display: flex;
      flex-direction: column;
    }
    .activity-menu-item .menu-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .activity-menu-item .menu-left .menu-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      color: var(--text-secondary);
    }
    .activity-menu-item .menu-left .menu-icon .material-symbols-sharp {
      font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' -25, 'opsz' 48;
    }
    .activity-menu-item .menu-left .menu-name {
      font-size: 14px;
      font-weight: 500;
      color: white;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .activity-menu-item .menu-right {
      display: flex;
      align-items: center;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="appHeader"></div>
    <main class="app-main">
      <!-- 상단 스탯 -->
      <div class="activity-stats">
        <div class="stat-item">
          <span class="stat-value" data-count="12">0</span>
          <span class="stat-label">캠페인완료</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" data-count="5">0</span>
          <span class="stat-label">상품대여</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" data-count="3">0</span>
          <span class="stat-label">상품컨택</span>
        </div>
      </div>

      <!-- 메뉴 리스트 -->
      <div class="activity-menu-list">
        <a href="campaign-management.html" class="activity-menu-item">
          <div class="menu-left">
            <div class="menu-icon">
              <span class="material-symbols-sharp" style="font-size:28px">play_arrow</span>
            </div>
            <span class="menu-name">캠페인 관리 <span class="dot-purple"></span></span>
          </div>
          <div class="menu-right"></div>
        </a>
        <a href="rental-management.html" class="activity-menu-item">
          <div class="menu-left">
            <div class="menu-icon">
              <span class="material-symbols-sharp" style="font-size:22px">package_2</span>
            </div>
            <span class="menu-name">상품대여 관리 <span class="dot-purple"></span></span>
          </div>
          <div class="menu-right"></div>
        </a>
        <a href="content-management.html" class="activity-menu-item">
          <div class="menu-left">
            <div class="menu-icon">
              <span class="material-symbols-sharp" style="font-size:22px">imagesmode</span>
            </div>
            <span class="menu-name">콘텐츠 관리</span>
          </div>
          <div class="menu-right"></div>
        </a>
        <a href="store-management.html" class="activity-menu-item">
          <div class="menu-left">
            <div class="menu-icon">
              <span class="material-symbols-sharp" style="font-size:22px">apparel</span>
            </div>
            <span class="menu-name">쇼룸 관리</span>
          </div>
          <div class="menu-right"></div>
        </a>
        <a href="contact-management.html" class="activity-menu-item">
          <div class="menu-left">
            <div class="menu-icon">
              <span class="material-symbols-sharp" style="font-size:22px">handshake</span>
            </div>
            <span class="menu-name">협찬/컨택 <span class="dot-purple"></span></span>
          </div>
          <div class="menu-right"></div>
        </a>
        <a href="address-management.html" class="activity-menu-item">
          <div class="menu-left">
            <div class="menu-icon">
              <span class="material-symbols-sharp" style="font-size:22px">location_on</span>
            </div>
            <span class="menu-name">배송지 관리</span>
          </div>
          <div class="menu-right"></div>
        </a>
      </div>
    </main>
    <div id="appBottomNav"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script>
    $(function () {
      /* chevronRight SVG 삽입 */
      $('.activity-menu-item .menu-right').each(function () {
        $(this).html(SVG.chevronRight);
      });

      /* 숫자 카운트업 애니메이션 */
      $('.stat-value[data-count]').each(function () {
        var end = parseInt($(this).data('count'), 10);
        countUp(this, end, 800);
      });
    });
  </script>
</body>
</html>
