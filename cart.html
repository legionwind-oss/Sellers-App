<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장바구니</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cart-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
      gap: 16px;
    }
    .cart-empty-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-empty-icon svg {
      color: #999;
    }
    .cart-empty-text {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
    }
    .cart-empty-btn {
      margin-top: 8px;
      padding: 10px 24px;
      border: 1px solid #555;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      transition: background 0.15s;
    }
    .cart-empty-btn:hover {
      background: var(--bg-elevated);
    }
    .recent-section {
      padding: 24px 16px;
      border-top: 1px solid var(--border-default);
    }
    .recent-section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .recent-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
    }
    .recent-scroll::-webkit-scrollbar {
      display: none;
    }
    .recent-product {
      flex-shrink: 0;
      width: 120px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }
    .recent-product-img {
      width: 120px;
      height: 120px;
      background: #333;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .recent-product-img .btn-heart {
      position: absolute;
      bottom: 6px;
      right: 6px;
      padding: 4px;
      color: var(--text-secondary);
      transition: color 0.15s;
    }
    .recent-product-img .btn-heart:hover {
      color: white;
    }
    .recent-product-info .rp-brand {
      font-size: 9px;
      color: var(--text-secondary);
      font-weight: 700;
    }
    .recent-product-info .rp-name {
      font-size: 11px;
      font-weight: 500;
      color: white;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .recent-product-info .rp-price {
      font-size: 12px;
      font-weight: 700;
      color: white;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="appHeader"></div>
    <main class="app-main">
      <div class="tab-bar">
        <button class="tab-item active" data-tab="normal">일반 장바구니</button>
        <button class="tab-item" data-tab="rental">대여상품 장바구니</button>
      </div>

      <div id="tabNormal" class="cart-tab-content">
        <div class="cart-empty">
          <div class="cart-empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16h.01"/><path d="M12 8v4"/></svg>
          </div>
          <p class="cart-empty-text">일반 장바구니에 담겨있는 상품이 없습니다.</p>
          <a href="index.html" class="cart-empty-btn">쇼핑 계속하기</a>
        </div>

        <div class="recent-section">
          <h3 class="recent-section-title">최근 본 상품은 어때요?</h3>
          <div class="recent-scroll hide-scrollbar">
            <div class="recent-product">
              <div class="recent-product-img">
                <button class="btn-heart" onclick="toggleLike(this)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.04 3 5.5l7 7Z"/></svg>
                </button>
              </div>
              <div class="recent-product-info">
                <p class="rp-brand">DM_L_디몬스터</p>
                <p class="rp-name">테스트 자켓</p>
                <p class="rp-price">1,000원</p>
              </div>
            </div>
            <div class="recent-product">
              <div class="recent-product-img">
                <button class="btn-heart" onclick="toggleLike(this)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.04 3 5.5l7 7Z"/></svg>
                </button>
              </div>
              <div class="recent-product-info">
                <p class="rp-brand">글래머</p>
                <p class="rp-name">글래머 니트 탑</p>
                <p class="rp-price">12,000원</p>
              </div>
            </div>
            <div class="recent-product">
              <div class="recent-product-img">
                <button class="btn-heart" onclick="toggleLike(this)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.04 3 5.5l7 7Z"/></svg>
                </button>
              </div>
              <div class="recent-product-info">
                <p class="rp-brand">로건</p>
                <p class="rp-name">USA 절개 오버핏 반팔티</p>
                <p class="rp-price">32,000원</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tabRental" class="cart-tab-content" hidden>
        <div class="cart-empty">
          <div class="cart-empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16h.01"/><path d="M12 8v4"/></svg>
          </div>
          <p class="cart-empty-text">대여상품 장바구니에 담겨있는 상품이 없습니다.</p>
          <a href="index.html" class="cart-empty-btn">쇼핑 계속하기</a>
        </div>
      </div>
    </main>
    <div id="appBottomNav"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script>
    $(function() {
      $('.tab-item').on('click', function() {
        $('.tab-item').removeClass('active');
        $(this).addClass('active');
        var tab = $(this).data('tab');
        $('.cart-tab-content').attr('hidden', true);
        if (tab === 'normal') {
          $('#tabNormal').removeAttr('hidden');
        } else {
          $('#tabRental').removeAttr('hidden');
        }
      });
    });
  </script>
</body>
</html>
