<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>준비중</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .placeholder-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      padding: 40px 24px;
      text-align: center;
    }
    .placeholder-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,.2) 0%, transparent 100%);
      border: 1px solid rgba(255,255,255,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .placeholder-title {
      font-size: 18px;
      font-weight: 700;
      color: white;
      margin-top: 8px;
    }
    .placeholder-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .btn-go-back {
      margin-top: 12px;
      background: #222;
      color: white;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn-go-back:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="appHeader"></div>
    <main class="app-main">
      <div class="placeholder-wrap">
        <div class="placeholder-icon">🚧</div>
        <h2 class="placeholder-title">준비중</h2>
        <p class="placeholder-desc">
          해당 페이지는 현재 열심히 준비 중입니다.<br>
          조금만 기다려 주시면 멋진 모습으로 찾아올게요!
        </p>
        <button class="btn-go-back" onclick="history.back()">이전 화면으로 돌아가기</button>
      </div>
    </main>
    <div id="appBottomNav"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
