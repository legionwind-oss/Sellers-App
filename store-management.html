<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼룸 관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .guide-card {
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
      margin: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .guide-card .guide-title {
      font-size: 13px;
      font-weight: 700;
      color: white;
    }
    .guide-card .guide-desc {
      font-size: 11px;
      color: #AAAAAA;
      line-height: 1.6;
    }
    .guide-card .btn-register {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: white;
      color: black;
      font-size: 12px;
      font-weight: 700;
      border-radius: 10px;
      height: 40px;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .guide-card .btn-register:hover {
      background: #e5e5e5;
    }
    .section-divider {
      height: 1px;
      background: var(--border-default);
      margin: 0 16px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      padding: 20px 16px 12px;
    }
    .product-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin: 0 16px 12px;
      display: flex;
      gap: 14px;
    }
    .product-item .product-thumb {
      width: 56px;
      height: 56px;
      background: #333;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 700;
    }
    .product-item .product-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .product-item .product-brand {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 400;
    }
    .product-item .product-name {
      font-size: 13px;
      font-weight: 600;
      color: white;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .product-item .product-price {
      font-size: 13px;
      font-weight: 700;
      color: white;
      margin-top: 2px;
    }
    .product-item .product-revenue {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-blue);
      margin-top: 2px;
    }
    .product-item .btn-delist {
      align-self: flex-start;
      background: #333;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .product-item .btn-delist:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="appHeader"></div>
    <main class="app-main">
      <div class="guide-card">
        <span class="guide-title">브랜드 상품 판매하고 수익 쉐어 받기 💸</span>
        <p class="guide-desc">내가 구매했던 상품이나 추천하고 싶은 브랜드 상품을 내 상점에 등록해보세요. 판매가 발생하면 설정된 수익금을 쉐어받을 수 있습니다.</p>
        <button class="btn-register" id="btnRegister"></button>
      </div>

      <div class="section-divider"></div>
      <h3 class="section-title">내 상점 판매 상품 목록</h3>

      <div class="product-item">
        <div class="product-thumb">IMG</div>
        <div class="product-info">
          <span class="product-brand">오호스(OJOS)</span>
          <span class="product-name">크롭 반팔 티셔츠 화이트</span>
          <span class="product-price">39,000원</span>
          <span class="product-revenue">예상 수익: 판매가의 10%</span>
        </div>
        <button class="btn-delist">내리기</button>
      </div>

      <div class="product-item">
        <div class="product-thumb">IMG</div>
        <div class="product-info">
          <span class="product-brand">앤더슨벨</span>
          <span class="product-name">유니섹스 와이드 데님 팬츠</span>
          <span class="product-price">89,000원</span>
          <span class="product-revenue">예상 수익: 판매가의 12%</span>
        </div>
        <button class="btn-delist">내리기</button>
      </div>
    </main>
    <div id="appBottomNav"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script>
    $(function () {
      $('#btnRegister').html(SVG.shoppingBag + ' 상품 등록하러 가기');

      $('.btn-delist').on('click', function () {
        if (confirm('해당 상품을 내 상점에서 내리시겠습니까?')) {
          $(this).closest('.product-item').fadeOut(200);
        }
      });
    });
  </script>
</body>
</html>
